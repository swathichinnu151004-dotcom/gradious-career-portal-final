<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Signup - Gradious Career Portal</title>
  <link rel="stylesheet" href="../css/recruiter-signup.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="signup-container">
    <div class="signup-card">

      <div class="signup-left">
        <h1>Recruiter Signup</h1>
        <p>Complete your recruiter registration using the invite link sent by admin.</p>

        <div class="info-box">
          <i class="fa-solid fa-envelope-open-text"></i>
          <span>Your invite email will be verified automatically.</span>
        </div>
      </div>

      <div class="signup-right">
        <form id="recruiterSignupForm">

          <div class="form-group">
            <label for="email">Invited Email</label>
            <input
              type="email"
              id="email"
              name="email"
              readonly
            />
          </div>

          <div class="form-group">
            <label for="name">Full Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your full name"
              required
            />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number</label>
            <input
              type="text"
              id="phone"
              name="phone"
              placeholder="Enter your phone number"
              maxlength="10"
              required
            />
          </div>

          <div class="form-group">
            <label for="companyName">Company Name</label>
            <input
              type="text"
              id="companyName"
              name="companyName"
              placeholder="Enter your company name"
              required
            />
          </div>

          <div class="form-group">
            <label for="location">Location</label>
            <input
              type="text"
              id="location"
              name="location"
              placeholder="Enter your location"
              required
            />
          </div>

          <div class="form-group password-group">
            <label for="password">Password</label>
            <div class="password-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter password"
                required
              />
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fa-solid fa-eye"></i>
              </button>
            </div>
            <small class="input-hint">
              Must be at least 8 characters, include 1 uppercase letter, 1 number, and 1 special character.
            </small>
          </div>

          <button type="submit" class="signup-btn">
            <i class="fa-solid fa-user-plus"></i> Create Recruiter Account
          </button>

          <p id="signupMessage" class="form-message"></p>
        </form>
      </div>
    </div>
  </div>

  <script src="../js/recruiter-signup.js"></script>
</body>
</html>
