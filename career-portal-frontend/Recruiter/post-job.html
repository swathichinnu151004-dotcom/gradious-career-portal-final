<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post Job - Recruiter Panel</title>
  <link rel="stylesheet" href="../css/post-jobs.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <div class="recruiter-layout">

    <aside class="recruiter-sidebar">
      <div class="recruiter-logo">
        <img src="../images/logo.png" alt="Gradious Logo" />
        <span>Recruiter Panel</span>
      </div>

      <nav class="recruiter-menu">
        <a href="dashboard.html">
          <i class="fa-solid fa-chart-line"></i>
          <span>Dashboard</span>
        </a>

        <a href="post-job.html" class="active">
          <i class="fa-solid fa-plus"></i>
          <span>Post Job</span>
        </a>

        <a href="manage-recruiter-jobs.html">
          <i class="fa-solid fa-briefcase"></i>
          <span>Manage Jobs</span>
        </a>

        <a href="recruiter-applications.html">
          <i class="fa-solid fa-file-lines"></i>
          <span>Applications</span>
        </a>
      </nav>
    </aside>

    <main class="recruiter-main">

      <div class="recruiter-topbar">
        <div class="topbar-left">
          <h1>Post Job</h1>
          <p>Create and publish a new job opening</p>
        </div>

        <div class="topbar-right">
          <div class="notification">
            <button type="button" class="icon-btn">
              <i class="fa-solid fa-bell"></i>
              <span class="badge">0</span>
            </button>
          </div>

          <div class="user-profile">
            <div class="avatar">
              <i class="fa-solid fa-user"></i>
            </div>

            <div class="user-info">
              <span class="name">Recruiter</span>
              <span class="role">Recruiter Panel</span>
            </div>

            <button class="logout-btn" onclick="recruiterLogout()">
              <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
          </div>
        </div>
      </div>

      <section class="post-job-section">
        <form id="postJobForm" class="post-job-form">
          <div class="form-row">
            <div class="form-group">
              <label for="jobTitle">Job Title</label>
              <input type="text" id="jobTitle" placeholder="Enter job title" required />
            </div>

            <div class="form-group">
              <label for="department">Department</label>
              <input type="text" id="department" placeholder="Enter department" required />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="location">Location</label>
              <input type="text" id="location" placeholder="Enter location" required />
            </div>

            <div class="form-group">
              <label for="experience">Experience</label>
              <input type="text" id="experience" placeholder="Example: 2+ Years" required />
            </div>
          </div>

          <div class="form-row single">
            <div class="form-group full-width">
              <label for="description">Job Description</label>
              <textarea id="description" rows="7" placeholder="Enter job description" required></textarea>
            </div>
          </div>

          <p id="postJobMessage" class="form-message"></p>

          <div class="form-actions">
            <button type="submit" class="submit-btn" id="submitBtn">
              <i class="fa-solid fa-paper-plane"></i>
              <span>Post Job</span>
            </button>
          </div>
        </form>
      </section>

    </main>
  </div>

  <script src="../js/post-job.js"></script>
</body>
</html>
