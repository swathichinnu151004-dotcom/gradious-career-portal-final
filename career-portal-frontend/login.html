<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradious Careers Portal - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="slider-container">

    <img src="images/image1.jpg" class="slide active">
    <img src="images/image2.png" class="slide">
    <img src="images/image3.jpg" class="slide">

</div>

  <header class="header">
    <div class="navbar">
      <div class="logo">
        <img src="images/logo.png" alt="Gradious Logo" />
        <span>Gradious Careers Portal</span>
      </div>

      <nav class="nav">
        <a href="index1.html">Home</a>
        <a href="login.html" class="active">Login</a>
        <a href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <section class="login-page">
    <div class="login-container">

      <div class="login-card">
        <h2>Login</h2>
        <p class="login-subtitle">Sign in to your Gradious account</p>

        <form id="loginForm" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginEmail">Email or Phone</label>
            <input
             type="text"
             id="loginEmail"
             name="identifier"
             placeholder="Enter your email or phone"
             required
             />
          </div>

          <div class="form-group">
            <div class="password-label-row">
              <label for="loginPassword">Password</label>
              <a href="./forgot-password.html">Forgot Password?</a>
            </div>

            <div class="password-box">
              <input
                type="password"
                id="loginPassword"
                name="password"
                placeholder="Enter your password"
                required
              />
              <span class="toggle-password" onclick="togglePassword('loginPassword')">👁</span>
            </div>
          </div>


          <p id="loginMessage" class="form-message"></p>

          <button type="submit" class="login-btn">Login</button>

          <p class="form-footer">
            New user?
            <a href="register.html">Create an account</a>
          </p>
        </form>
      </div>

    </div>
  </section>

  <script src="js/login.js"></script>
  <script>

let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {

    slides[index].classList.remove("active");

    index++;

    if(index >= slides.length){
        index = 0;
    }

    slides[index].classList.add("active");

}, 5000);

</script>
</body>
</html>
